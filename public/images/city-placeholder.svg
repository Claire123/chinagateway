<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#f0f9ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  
  <!-- Buildings -->
  <rect x="100" y="300" width="80" height="200" fill="#cbd5e1"/>
  <rect x="200" y="250" width="100" height="250" fill="#94a3b8"/>
  <rect x="320" y="200" width="120" height="300" fill="#64748b"/>
  <rect x="460" y="280" width="90" height="220" fill="#94a3b8"/>
  <rect x="580" y="320" width="110" height="180" fill="#cbd5e1"/>
  
  <!-- Windows -->
  <rect x="120" y="320" width="15" height="15" fill="#fbbf24" opacity="0.6"/>
  <rect x="145" y="320" width="15" height="15" fill="#fbbf24" opacity="0.6"/>
  <rect x="120" y="350" width="15" height="15" fill="#fbbf24" opacity="0.6"/>
  <rect x="145" y="350" width="15" height="15" fill="#fbbf24" opacity="0.6"/>
  
  <rect x="220" y="270" width="20" height="20" fill="#fbbf24" opacity="0.6"/>
  <rect x="250" y="270" width="20" height="20" fill="#fbbf24" opacity="0.6"/>
  <rect x="280" y="270" width="20" height="20" fill="#fbbf24" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="650" cy="100" r="50" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Ground -->
  <rect x="0" y="500" width="800" height="100" fill="#e2e8f0"/>
  
  <!-- Trees -->
  <circle cx="80" cy="480" r="30" fill="#86efac"/>
  <rect x="70" y="480" width="20" height="40" fill="#a8a29e"/>
  
  <circle cx="720" cy="470" r="35" fill="#86efac"/>
  <rect x="710" y="470" width="20" height="50" fill="#a8a29e"/>
</svg>